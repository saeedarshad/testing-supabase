<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8">
    <div class="text-center">
      <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
        Reset your password
      </h2>
      <p class="mt-2 text-sm text-gray-600">
        Or
        <a routerLink="/auth/login" class="font-medium text-blue-600 hover:text-blue-500">
          return to sign in
        </a>
      </p>
    </div>
    
    <p-card class="w-full">
      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        @if (errorMessage()) {
          <p-message severity="error" [text]="errorMessage()" styleClass="w-full"></p-message>
        }

        @if (successMessage()) {
          <p-message severity="success" [text]="successMessage()" styleClass="w-full"></p-message>
        }

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
          <div class="mt-1">
            <input 
              pInputText 
              id="email" 
              formControlName="email" 
              type="email" 
              autocomplete="email" 
              class="w-full"
              [class.ng-invalid]="email?.invalid && email?.touched"
              placeholder="Enter your email address"
            />
            @if (email?.invalid && email?.touched) {
              <small class="text-red-600 mt-1 block">
                @if (email?.errors?.['required']) {
                  Email is required
                }
                @if (email?.errors?.['email']) {
                  Please enter a valid email address
                }
              </small>
            }
          </div>
        </div>

        <div>
          <p-button 
            type="submit" 
            label="Send Reset Instructions" 
            [loading]="loading()"
            [disabled]="resetForm.invalid"
            styleClass="w-full"
          ></p-button>
        </div>

        <div class="text-center">
          <p class="text-sm text-gray-600">
            Remember your password?
            <a routerLink="/auth/login" class="font-medium text-blue-600 hover:text-blue-500">
              Sign in
            </a>
          </p>
        </div>
      </form>
    </p-card>
  </div>
</div>
